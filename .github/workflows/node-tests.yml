name: Run Node Unit Tests

on:
  pull_request:
    branches:
      - master
  workflow_call:
  workflow_dispatch:

permissions: {}

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-26
          - ubuntu-24.04
          - windows-2025
        node-version:
          - '22'
          - '24'
          - '26'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v7.0.0
        with:
          cache: 'npm'
          check-latest: true
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm ci
      - name: Lint with npm
        run: npm run stylelint
      - name: Test with npm
        run: npm run test
